<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raipur Admin | Grievance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <!-- Sidebar content will be injected by sidebar.js -->
        </aside>
        <div class="main">
            <div class="topbar">
                <div>Grievance</div>
                <div>Hello Admin | Logout</div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Grievance Management</div>
                        <button class="btn btn-success">
                            + Add New Grievance
                        </button>
                    </div>
                    <div class="table-controls">
                        <div class="entries-box">
                            Show <select><option>10</option></select> entries
                        </div>
                        <div class="search-container">
                            <input type="text" placeholder="Search...">
                            <button><i class="fa fa-search"></i></button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Sr. No.</th>
                                    <th>User Name</th>
                                    <th>Subject</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>John Doe</td>
                                    <td>Water Supply Issue</td>
                                    <td>Pending</td>
                                    <td>
                                        <button class="btn btn-primary">Edit</button>
                                        <button class="btn btn-danger">Delete</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="sidebar.js"></script>
    <script src="grievance.js"></script>
</body>
</html>
